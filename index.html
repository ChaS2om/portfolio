<div
  id="video-popup"
  onclick="closeVideoPopup(event)"
  style="
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.9);
    z-index: 9999;
    align-items: center;
    justify-content: center;
    cursor: zoom-out;
  "
>
  <div
    onclick="event.stopPropagation()"
    style="
      position: relative;
      width: 1280px;
      height: 720px;
      cursor: default;
    "
  >
    <!-- 닫기 버튼 -->
    <div
      onclick="closeVideoPopup(event)"
      style="
        position: absolute;
        top: -50px;
        right: 0px;
        color: white;
        font-size: 40px;
        cursor: pointer;
        line-height: 1;
        opacity: 0.8;
        transition: opacity 0.2s;
      "
      onmouseover="this.style.opacity='1'"
      onmouseout="this.style.opacity='0.8'"
    >✕</div>

    <!-- 유튜브 영상: src의 VIDEO_ID를 실제 유튜브 ID로 교체 -->

      allow="autoplay; encrypted-media"
      allowfullscreen
      style="display: block;"
    ></iframe>
  </div>
</div>
